<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carica le tue foto — Rocco & Rossella</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .upload-card {
      max-width: 560px; margin: 0 auto;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px;
      box-shadow: 0 4px 24px rgba(14,118,16,0.06);
    }
    label.field-label { display:block; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
    input[type="text"] { width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:12px; font-family:'Lato',sans-serif; font-size:15px; color:var(--dark); background:var(--cream); outline:none; transition:border-color 0.2s; margin-bottom:22px; }
    input[type="text"]:focus { border-color:var(--green); background:var(--white); }
    .drop-label { display:block; border:2px dashed var(--border); border-radius:16px; padding:38px 20px; text-align:center; cursor:pointer; background:var(--cream); transition:border-color 0.25s, background 0.25s; margin-bottom:18px; -webkit-tap-highlight-color:transparent; }
    .drop-label:hover { border-color:var(--green); background:var(--green-light); }
    .drop-label input[type="file"] { display:none; }
    .drop-icon { font-size:38px; margin-bottom:10px; display:block; pointer-events:none; }
    .drop-text { font-size:14px; color:var(--muted); line-height:1.6; pointer-events:none; }
    .drop-text strong { color:var(--green); }
    .drop-hint { font-size:11px; color:var(--border-2); margin-top:5px; pointer-events:none; }
    #preview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(74px,1fr)); gap:8px; margin-bottom:18px; }
    .preview-thumb { aspect-ratio:1; border-radius:10px; overflow:hidden; position:relative; border:1.5px solid var(--border); }
    .preview-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .remove-btn { position:absolute; top:3px; right:3px; background:rgba(0,0,0,0.55); color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .file-count { font-size:13px; color:var(--green); font-weight:700; text-align:center; margin-bottom:14px; display:none; }
    .progress-wrap { display:none; margin-bottom:18px; }
    .progress-label { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:7px; }
    .progress-bar-bg { background:var(--border); border-radius:100px; height:6px; overflow:hidden; }
    .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--green),#4caf50); border-radius:100px; width:0%; transition:width 0.4s ease; }
    .btn-upload { width:100%; padding:15px; background:linear-gradient(135deg,var(--green),var(--green-dark)); color:#fff; border:none; border-radius:50px; font-family:'Lato',sans-serif; font-size:15px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:opacity 0.2s,transform 0.15s; }
    .btn-upload:hover:not(:disabled) { opacity:0.9; transform:translateY(-1px); }
    .btn-upload:disabled { opacity:0.45; cursor:not-allowed; }
    .msg { display:none; border-radius:14px; padding:16px 20px; font-size:14px; line-height:1.6; margin-top:18px; text-align:center; }
    .msg-success { background:var(--green-light); border:1.5px solid var(--border-2); color:var(--green-dark); }
    .msg-error { background:#fdf0f0; border:1.5px solid #e0b3b3; color:#8a2a2a; }
    @media (max-width:480px) { .upload-card { padding:24px 18px; } }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">
        <img src="nuvola.png" style="width:28px;opacity:0.9;" alt="" />
        Rocco & Rossella
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Il Giorno</a></li>
        <li><a href="tableau.html">Tavoli</a></li>
        <li><a href="menu.html">Menù</a></li>
        <li><a href="foto.html" class="active">📷 Foto</a></li>
        <li><a href="commenti.html">💬</a></li>
      </ul>
    </div>
  </nav>

  <div class="hero">
    <img src="nuvola.png" class="hero-nuvola hero-nuvola-l" alt="" />
    <img src="nuvola.png" class="hero-nuvola hero-nuvola-r" alt="" />
    <p class="hero-date">24 Giugno 2026</p>
    <div class="hero-names" style="font-size:clamp(1.8rem,5vw,3rem);"><em>Le vostre foto</em></div>
    <div class="hero-divider"></div>
    <p class="hero-sub">Hai catturato un momento speciale?<br>Regalacelo — resterà con noi per sempre.</p>
  </div>

  <div class="page-body">
    <div class="upload-card">
      <label class="field-label" for="nome-input">Il tuo nome</label>
      <input type="text" id="nome-input" placeholder="Es. Marco Rossi" autocomplete="name" />
      <span class="field-label">Le tue foto</span>
      <label class="drop-label" id="drop-label">
        <input type="file" id="file-input" accept="image/*" multiple />
        <span class="drop-icon">📷</span>
        <p class="drop-text"><strong>Tocca qui per scegliere le foto</strong><br>oppure trascinale in questo riquadro</p>
        <p class="drop-hint">JPG, PNG, HEIC · max 15 MB per foto · max 20 foto</p>
      </label>
      <div id="file-count" class="file-count"></div>
      <div id="preview-grid"></div>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-label"><span id="progress-text">Caricamento…</span><span id="progress-pct">0%</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      </div>
      <button class="btn-upload" id="btn-upload" disabled>📷 &nbsp;Carica le foto</button>
      <div class="msg msg-success" id="msg-success"></div>
      <div class="msg msg-error" id="msg-error"></div>
    </div>
  </div>

  <footer>
    <img src="nuvola.png" alt="" />
    Rocco &amp; Rossella &nbsp;·&nbsp; 24 Giugno 2026 &nbsp;·&nbsp; Barletta
  </footer>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwOmO-SYxM8b9c8LaH-erVfcw5jHc0ITyMw4MW-PLX8QQqs0NHAILN7wSJOnnJL4xmOew/exec';
    const MAX_MB = 15, MAX_FILES = 20;
    const fileInput = document.getElementById('file-input');
    const dropLabel = document.getElementById('drop-label');
    const previewGrid = document.getElementById('preview-grid');
    const fileCount = document.getElementById('file-count');
    const btnUpload = document.getElementById('btn-upload');
    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const progressPct = document.getElementById('progress-pct');
    const msgSuccess = document.getElementById('msg-success');
    const msgError = document.getElementById('msg-error');
    const nomeInput = document.getElementById('nome-input');
    let selectedFiles = [];

    dropLabel.addEventListener('dragover', e => { e.preventDefault(); dropLabel.style.borderColor='var(--green)'; });
    dropLabel.addEventListener('dragleave', () => { dropLabel.style.borderColor=''; });
    dropLabel.addEventListener('drop', e => { e.preventDefault(); dropLabel.style.borderColor=''; addFiles([...e.dataTransfer.files]); });
    fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value=''; });

    function addFiles(newFiles) {
      const images = newFiles.filter(f => f.type.startsWith('image/'));
      const tooBig = images.filter(f => f.size > MAX_MB*1024*1024);
      if (tooBig.length) showError(`${tooBig.length} foto superano i ${MAX_MB} MB.`);
      const valid = images.filter(f => f.size <= MAX_MB*1024*1024);
      selectedFiles = [...selectedFiles, ...valid].slice(0, MAX_FILES);
      renderPreviews();
    }
    function renderPreviews() {
      previewGrid.innerHTML = '';
      selectedFiles.forEach((file, idx) => {
        const url = URL.createObjectURL(file);
        const thumb = document.createElement('div');
        thumb.className = 'preview-thumb';
        thumb.innerHTML = `<img src="${url}" alt=""/><button class="remove-btn" data-idx="${idx}">✕</button>`;
        previewGrid.appendChild(thumb);
      });
      previewGrid.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', e => { e.preventDefault(); selectedFiles.splice(+btn.dataset.idx,1); renderPreviews(); });
      });
      fileCount.style.display = selectedFiles.length ? 'block' : 'none';
      fileCount.textContent = `${selectedFiles.length} foto selezionat${selectedFiles.length===1?'a':'e'}`;
      btnUpload.disabled = selectedFiles.length === 0;
      hideMessages();
    }
    function hideMessages() { msgSuccess.style.display='none'; msgError.style.display='none'; }
    function showError(msg) { msgError.textContent=msg; msgError.style.display='block'; msgSuccess.style.display='none'; }
    function toBase64(file) {
      return new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
    }
    function setProgress(i, total) {
      const pct = Math.round((i/total)*100);
      progressFill.style.width = pct+'%';
      progressPct.textContent = pct+'%';
      progressText.textContent = i<total ? `Foto ${i+1} di ${total}…` : 'Completato!';
    }
    btnUpload.addEventListener('click', async () => {
      if (!selectedFiles.length) return;
      const nome = nomeInput.value.trim() || 'Ospite';
      btnUpload.disabled = true;
      progressWrap.style.display = 'block';
      hideMessages();
      const total = selectedFiles.length;
      let uploaded = 0, errors = 0;
      for (let i=0; i<total; i++) {
        setProgress(i, total);
        try {
          const base64 = await toBase64(selectedFiles[i]);
          const res = await fetch(SCRIPT_URL, { method:'POST', mode:'cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({tipo:'foto', nome, file:base64, fileName:selectedFiles[i].name, mimeType:selectedFiles[i].type}) });
          const json = await res.json();
          json.success ? uploaded++ : errors++;
        } catch { errors++; }
      }
      setProgress(total, total);
      setTimeout(() => { progressWrap.style.display='none'; }, 600);
      if (uploaded>0 && errors===0) {
        msgSuccess.innerHTML = `<strong>Grazie mille, ${nome}! 💚</strong><br>${uploaded} foto caricate con successo.`;
        msgSuccess.style.display = 'block';
        selectedFiles = []; renderPreviews();
      } else if (uploaded>0) {
        msgSuccess.innerHTML = `<strong>${uploaded} foto caricate</strong> — ${errors} non riuscite.`;
        msgSuccess.style.display = 'block';
      } else {
        showError('Errore di connessione. Riprova tra qualche istante.');
        btnUpload.disabled = false;
      }
    });
  </script>
</body>
</html>
