  <title>I Tavoli — Rocco & Rossella</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      margin-bottom: 32px;
    }
    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
    }
    #search-input {
      width: 100%;
      padding: 15px 18px 15px 50px;
      border: 2px solid var(--border);
      border-radius: 50px;
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      color: var(--dark);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(201,169,110,0.12);
    }
    #search-input::placeholder { color: var(--muted); }

    /* ── RESULT HIGHLIGHT ── */
    .search-result-banner {
      display: none;
      background: linear-gradient(135deg, #2C2C2C, #4a3f35);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 28px;
      text-align: center;
      color: #fff;
    }
    .search-result-banner.show { display: block; }
    .result-name {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .result-table-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.1;
    }
    .result-table-name em {
      font-style: italic;
      color: var(--gold-light);
    }
    .result-companions {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
    }

    /* ── TABLES GRID ── */
    .tables-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .table-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .table-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .table-card.highlight {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.2), 0 8px 32px rgba(0,0,0,0.08);
    }
    .table-card-header {
      background: linear-gradient(135deg, #2C2C2C, #4a3f35);
      padding: 16px 20px 14px;
    }
    .table-card.highlight .table-card-header {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    }
    .table-number {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 3px;
    }
    .table-card.highlight .table-number { color: rgba(255,255,255,0.7); }
    .table-constellation {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
      font-style: italic;
    }
    .table-count {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }
    .table-card-body { padding: 14px 20px; }
    .guest-list { list-style: none; }
    .guest-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 14px;
      color: var(--dark);
      border-bottom: 1px solid var(--border);
      line-height: 1.3;
    }
    .guest-item:last-child { border-bottom: none; }
    .guest-item.highlighted {
      font-weight: 700;
      color: var(--gold-dark);
    }
    .guest-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .guest-item.highlighted .guest-dot { background: var(--gold); }

    /* ── NO RESULT ── */
    #no-result {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 15px;
    }
  </style>
</head>

const grid = document.getElementById('tables-grid');

    const resultTableConst = document.getElementById('result-table-constellation');

    const noResult = document.getElementById('no-result');

    function normalize(str) {
      return str.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[''']/g, "'")
        .trim();

    function renderTables(highlightName = '') {
      const normQuery = normalize(highlightName);
      let foundTable = null;
      let foundGuest = null;

      if (normQuery.length >= 2) {
        for (const table of TABLES) {
          for (const guest of table.guests) {
            if (normalize(guest.name).includes(normQuery)) {
              foundTable = table;
              foundGuest = guest;
              break;
            }
          }
          if (foundTable) break;
        }
      }

      // Banner risultato
      if (foundGuest && foundTable) {
        resultGuestName.textContent = foundGuest.name;
        resultTableConst.textContent = `${foundTable.number} — ${foundTable.constellation}`;
        const companions = foundTable.guests
          .filter(g => g.name !== foundGuest.name)
          .map(g => g.name).join(', ');
        resultCompanions.textContent = companions ? `Con: ${companions}` : '';
        resultBanner.classList.add('show');
        noResult.style.display = 'none';
      } else if (normQuery.length >= 2 && !foundGuest) {
        resultBanner.classList.remove('show');
        noResult.style.display = 'block';
      } else {
        resultBanner.classList.remove('show');
        noResult.style.display = 'none';
      }

      // Render cards
      grid.innerHTML = '';
      TABLES.forEach(table => {
        const isHighlighted = foundTable && foundTable.id === table.id;
        const card = document.createElement('div');
        card.className = 'table-card' + (isHighlighted ? ' highlight' : '');

        const guestItems = table.guests.map(g => {
          const isMe = foundGuest && normalize(g.name) === normalize(foundGuest.name);
          return `<li class="guest-item${isMe ? ' highlighted' : ''}">
            <span class="guest-dot"></span>
            <span>${g.name}</span>
            
          </li>`;
        }).join('');

        card.innerHTML = `
          <div class="table-card-header">
            <p class="table-number">${table.number}</p>
            <p class="table-constellation">${table.constellation}</p>
            <p class="table-count">${table.guests.length} ospiti</p>
          </div>
          <div class="table-card-body">
            <ul class="guest-list">${guestItems}</ul>
          </div>
        `;

        grid.appendChild(card);

        if (isHighlighted) {
          setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
        }
      });
    }

    renderTables();

    // Search
    let debounce;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => renderTables(searchInput.value), 250);
