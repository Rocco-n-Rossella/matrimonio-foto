  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── HERO STELLE ── */
    .stelle-hero {
      width: 100%;
      background: linear-gradient(160deg, #0d0e1a 0%, #1a1b2e 100%);
      text-align: center;
      padding: 52px 24px 44px;
      position: relative;
      overflow: hidden;
    }
    .stelle-hero .hero-date { color: rgba(201,169,110,0.7); font-size:11px; letter-spacing:4px; text-transform:uppercase; margin-bottom:14px; }
    .stelle-hero .hero-names { font-family:'Cormorant Garamond',serif; font-size:clamp(1.8rem,5vw,3rem); color:#fff; font-style:italic; }
    .stelle-hero .hero-divider { background: var(--star-gold); }
    .stelle-hero .hero-sub { color: rgba(255,255,255,0.5); font-size:14px; }

    /* ── SEARCH ── */
    .search-wrap { position: relative; margin-bottom: 28px; }
    .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 17px; pointer-events: none; }
    #search-input {
      width: 100%; padding: 14px 18px 14px 50px;
      border: 2px solid rgba(201,169,110,0.3); border-radius: 50px;
      font-family: 'Lato', sans-serif; font-size: 15px;
      color: #e8e0d0; background: rgba(255,255,255,0.06);
      outline: none; transition: border-color 0.2s;
    }
    #search-input:focus { border-color: var(--star-gold); }
    #search-input::placeholder { color: rgba(255,255,255,0.3); }

    /* ── RESULT BANNER ── */
    .result-banner {
      display: none;
      background: rgba(201,169,110,0.12);
      border: 1px solid rgba(201,169,110,0.4);
      border-radius: 16px; padding: 20px 24px;
      margin-bottom: 28px; text-align: center;
    }
    .result-banner.show { display: block; }
    .result-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--star-gold); margin-bottom: 5px; }
    .result-table { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; color: #fff; line-height: 1.1; }
    .result-table em { font-style: italic; color: var(--star-pale); }
    .result-companions { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 6px; line-height: 1.5; }

    #no-result { display: none; text-align: center; padding: 36px 20px; color: rgba(255,255,255,0.4); font-size: 14px; }

    /* ── GRIGLIA TAVOLI ── */
    .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 18px; }

    .table-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,169,110,0.15);
      border-radius: 18px; overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .table-card:hover { border-color: rgba(201,169,110,0.35); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .table-card.highlight {
      border-color: var(--star-gold);
      box-shadow: 0 0 0 2px rgba(201,169,110,0.2), 0 8px 32px rgba(0,0,0,0.3);
    }

    .table-header { padding: 16px 18px 14px; position: relative; overflow: hidden; }
    .table-header::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,169,110,0.08), transparent);
    }
    .table-card.highlight .table-header::before { background: linear-gradient(135deg, rgba(201,169,110,0.18), transparent); }

    /* SVG costellazione mini */
    .constellation-svg {
      position: absolute; right: 12px; top: 10px;
      width: 56px; height: 56px; opacity: 0.35;
    }
    .constellation-svg.highlight-svg { opacity: 0.65; }

    .table-number { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(201,169,110,0.6); margin-bottom: 3px; position: relative; }
    .table-constellation { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; color: #fff; font-style: italic; position: relative; }
    .table-card.highlight .table-number { color: var(--star-gold); }
    .table-card.highlight .table-constellation { color: var(--star-pale); }
    .table-count { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; position: relative; }

    /* Linea oro sotto header */
    .table-divider { height: 1px; background: linear-gradient(to right, rgba(201,169,110,0.3), transparent); margin: 0 18px; }
    .table-card.highlight .table-divider { background: linear-gradient(to right, rgba(201,169,110,0.6), transparent); }

    .table-body { padding: 12px 18px 16px; }
    .guest-list { list-style: none; }
    .guest-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; font-size: 13px; color: rgba(255,255,255,0.65);
      border-bottom: 1px solid rgba(255,255,255,0.05); line-height: 1.3;
    }
    .guest-item:last-child { border-bottom: none; }
    .guest-item.me { font-weight: 700; color: var(--star-gold); }
    .guest-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(201,169,110,0.25); flex-shrink: 0; }
    .guest-item.me .guest-dot { background: var(--star-gold); box-shadow: 0 0 4px rgba(201,169,110,0.6); }
  </style>
</head>

    function makeConstellationSVG(name, highlight) {
      const base = CONST_SVGS[name] || '';
      return base.replace('<svg ', '<svg class="constellation-svg' + (highlight ? ' highlight-svg' : '') + '" ');
    }

    const grid         = document.getElementById('tables-grid');
    const searchInput  = document.getElementById('search-input');
    const resultBanner = document.getElementById('result-banner');
    const resultName   = document.getElementById('result-name');
    const resultConst  = document.getElementById('result-constellation');
    const resultComp   = document.getElementById('result-companions');
    const noResult     = document.getElementById('no-result');

    function norm(s) {
      return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[''']/g,"'").trim();
    }

    function render(query) {
      const q = norm(query);
      let foundTable = null, foundGuest = null;
      if (q.length >= 2) {
        outer: for (const t of TABLES) {
          for (const g of t.guests) {
            if (norm(g).includes(q)) { foundTable = t; foundGuest = g; break outer; }
          }
        }
      }
      if (foundGuest) {
        resultName.textContent = foundGuest;
        resultConst.textContent = foundTable.number + ' — ' + foundTable.constellation;
        const others = foundTable.guests.filter(g => g !== foundGuest);
        resultComp.textContent = others.length ? 'Con: ' + others.join(', ') : '';
        resultBanner.classList.add('show');
        noResult.style.display = 'none';
      } else if (q.length >= 2) {
        resultBanner.classList.remove('show');
        noResult.style.display = 'block';
      } else {
        resultBanner.classList.remove('show');
        noResult.style.display = 'none';
      }
      grid.innerHTML = '';
      for (const t of TABLES) {
        const isHL = foundTable && foundTable.id === t.id;
        const card = document.createElement('div');
        card.className = 'table-card' + (isHL ? ' highlight' : '');
        const items = t.guests.map(g => {
          const isMe = foundGuest && norm(g) === norm(foundGuest);
          return `<li class="guest-item${isMe?' me':''}"><span class="guest-dot"></span>${g}</li>`;
        }).join('');
        card.innerHTML = `
          <div class="table-header">
            ${makeConstellationSVG(t.constellation, isHL)}
            <p class="table-number">${t.number}</p>
            <p class="table-constellation">${t.constellation}</p>
            <p class="table-count">${t.guests.length} ospiti</p>
          </div>
          <div class="table-divider"></div>
          <div class="table-body"><ul class="guest-list">${items}</ul></div>`;
        grid.appendChild(card);
        if (isHL) setTimeout(() => card.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);
      }
    }

    render('');
    let deb;
    searchInput.addEventListener('input', () => { clearTimeout(deb); deb = setTimeout(() => render(searchInput.value), 200); });
  </script>
